# Reusable workflow: MCP tool QA (anaconda-mcp + environments-mcp + mcp-compose).
# Call from parameterized or scheduled workflows with different runner / Python / profile values.

name: MCP tool test execution

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub-hosted or self-hosted runner label'
        required: false
        type: string
        default: 'macos-latest'
      python_version:
        description: 'Python version for server and QA envs'
        required: false
        type: string
        default: '3.13'
      mcp_profile:
        description: 'Transport profile (http-http | stdio-http | stdio-stdio)'
        required: false
        type: string
        default: 'stdio-stdio'
      skip_hang_stress:
        description: 'Skip hang_stress tests'
        required: false
        type: string
        default: 'false'
      anaconda_mcp_ref:
        description: 'anaconda-mcp branch or tag (empty = triggered commit tree)'
        required: false
        type: string
        default: 'v1.0.0'
      environments_mcp_ref:
        description: 'environments-mcp branch or tag'
        required: false
        type: string
        default: 'v1.0.0'
      anaconda_connector_ver:
        description: 'anaconda-connector conda package version; empty = transitive dep'
        required: false
        type: string
        default: '0.1.11'
      mcp_compose_repo:
        description: 'mcp-compose GitHub URL'
        required: false
        type: string
        default: 'https://github.com/j-iliukhina-anaconda/mcp-compose'
      mcp_compose_ref:
        description: 'mcp-compose branch or tag (empty = anaconda-mcp pinned version)'
        required: false
        type: string
        default: 'stdio-proxy-fixes'
    secrets:
      GH_PACKAGE_TOKEN:
        required: true
      ANACONDA_CONNECTOR_TOKEN:
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    outputs:
      runner: ${{ steps.params.outputs.runner }}
      python-version: ${{ steps.params.outputs.python-version }}
      mcp-profile: ${{ steps.params.outputs.mcp-profile }}
      skip-hang-stress: ${{ steps.params.outputs.skip-hang-stress }}
      anaconda-mcp-ref: ${{ steps.params.outputs.anaconda-mcp-ref }}
      env-mcp-ref: ${{ steps.params.outputs.env-mcp-ref }}
      connector-ver: ${{ steps.params.outputs.connector-ver }}
      compose-repo: ${{ steps.params.outputs.compose-repo }}
      compose-ref: ${{ steps.params.outputs.compose-ref }}
      summary-file: ${{ steps.params.outputs.summary-file }}

    steps:
      - name: Resolve parameters
        id: params
        run: |
          RUNNER="${{ inputs.runner || 'macos-latest' }}"
          PYTHON_VERSION="${{ inputs.python_version || '3.13' }}"
          MCP_PROFILE="${{ inputs.mcp_profile || 'stdio-stdio' }}"
          SKIP_HANG_STRESS="${{ inputs.skip_hang_stress || 'false' }}"
          ANACONDA_MCP_REF="${{ inputs.anaconda_mcp_ref || 'v1.0.0' }}"
          ENV_MCP_REF="${{ inputs.environments_mcp_ref || 'v1.0.0' }}"
          CONNECTOR_VER="${{ inputs.anaconda_connector_ver || '0.1.11' }}"
          COMPOSE_REPO="${{ inputs.mcp_compose_repo || 'https://github.com/j-iliukhina-anaconda/mcp-compose' }}"
          COMPOSE_REF="${{ inputs.mcp_compose_ref || 'stdio-proxy-fixes' }}"

          SAFE_RUNNER="${RUNNER//[^a-zA-Z0-9._-]/-}"
          SUMMARY_FILE="profile-summary-${SAFE_RUNNER}-py${PYTHON_VERSION}-${MCP_PROFILE}.json"

          {
            echo "runner=$RUNNER"
            echo "python-version=$PYTHON_VERSION"
            echo "mcp-profile=$MCP_PROFILE"
            echo "skip-hang-stress=$SKIP_HANG_STRESS"
            echo "anaconda-mcp-ref=$ANACONDA_MCP_REF"
            echo "env-mcp-ref=$ENV_MCP_REF"
            echo "connector-ver=$CONNECTOR_VER"
            echo "compose-repo=$COMPOSE_REPO"
            echo "compose-ref=$COMPOSE_REF"
            echo "summary-file=$SUMMARY_FILE"
          } >> "$GITHUB_OUTPUT"

          echo "=== Resolved parameters ==="
          printf "%-22s %s\n" "runner:"           "$RUNNER"
          printf "%-22s %s\n" "python:"           "$PYTHON_VERSION"
          printf "%-22s %s\n" "mcp-profile:"      "$MCP_PROFILE"
          printf "%-22s %s\n" "skip-hang-stress:" "$SKIP_HANG_STRESS"
          printf "%-22s %s\n" "environments-mcp:" "$ENV_MCP_REF"
          printf "%-22s %s\n" "connector ver:"    "${CONNECTOR_VER:-<transitive dep>}"
          printf "%-22s %s\n" "mcp-compose repo:" "$COMPOSE_REPO"
          printf "%-22s %s\n" "mcp-compose ref:"  "${COMPOSE_REF:-<pinned by anaconda-mcp>}"

  test:
    needs: setup
    name: '[${{ needs.setup.outputs.runner }}] py${{ needs.setup.outputs.python-version }} / ${{ needs.setup.outputs.mcp-profile }}'
    runs-on: ${{ needs.setup.outputs.runner }}

    defaults:
      run:
        shell: bash -el {0}

    env:
      RUNNER: ${{ needs.setup.outputs.runner }}
      PYTHON_VERSION: ${{ needs.setup.outputs.python-version }}
      MCP_PROFILE: ${{ needs.setup.outputs.mcp-profile }}
      SKIP_HANG_STRESS: ${{ needs.setup.outputs.skip-hang-stress }}
      ANACONDA_MCP_REF: ${{ needs.setup.outputs.anaconda-mcp-ref }}
      ENV_MCP_REF: ${{ needs.setup.outputs.env-mcp-ref }}
      CONNECTOR_VER: ${{ needs.setup.outputs.connector-ver }}
      COMPOSE_REPO: ${{ needs.setup.outputs.compose-repo }}
      COMPOSE_REF: ${{ needs.setup.outputs.compose-ref }}
      SUMMARY_FILE: ${{ needs.setup.outputs.summary-file }}
      SERVER_ENV: anaconda-mcp-server
      QA_ENV: anaconda-mcp-qa

    steps:
      - name: Checkout (test code)
        uses: actions/checkout@v4

      - name: Checkout anaconda-mcp server version (${{ needs.setup.outputs.anaconda-mcp-ref }})
        if: ${{ env.ANACONDA_MCP_REF != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ANACONDA_MCP_REF }}
          path: ./anaconda-mcp-server-src

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@835234971496cad1653abb28a638a281cf32541f  # v3.2.0
        with:
          auto-activate-base: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create / update QA env (pytest + dependencies)
        run: |
          conda env create -n "$QA_ENV" -f tests/qa/environment.yml --yes \
          || conda env update -n "$QA_ENV" -f tests/qa/environment.yml --prune

      - name: Create server conda env
        run: conda create -n "$SERVER_ENV" "python=$PYTHON_VERSION" --yes

      - name: Install anaconda-mcp into server env
        run: |
          SRC="."
          if [[ -d "./anaconda-mcp-server-src" ]]; then
            SRC="./anaconda-mcp-server-src"
          fi
          conda run -n "$SERVER_ENV" --no-capture-output pip install -e "$SRC"

      - name: Checkout environments-mcp (${{ needs.setup.outputs.env-mcp-ref }})
        uses: actions/checkout@v4
        with:
          repository: anaconda/environments-mcp
          token: ${{ secrets.GH_PACKAGE_TOKEN }}
          path: ./environments-mcp
          ref: ${{ env.ENV_MCP_REF }}

      - name: Install environments-mcp (${{ needs.setup.outputs.env-mcp-ref }}) into server env
        run: conda run -n "$SERVER_ENV" --no-capture-output pip install -e ./environments-mcp

      - name: Install anaconda-connector
        run: |
          if [[ -n "$CONNECTOR_VER" ]]; then
            conda config --add channels "https://conda.anaconda.org/t/${{ secrets.ANACONDA_CONNECTOR_TOKEN }}/anaconda-connector"
            conda install -n "$SERVER_ENV" --yes -c conda-forge \
              "anaconda-connector-conda=$CONNECTOR_VER" \
              "anaconda-connector-core=$CONNECTOR_VER" \
              "anaconda-connector-utilities=$CONNECTOR_VER"
          else
            conda run -n "$SERVER_ENV" --no-capture-output \
              python -c "import anaconda_connector_conda" 2>/dev/null \
            || conda install -n "$SERVER_ENV" --yes -c conda-forge anaconda-connector-conda
          fi

      - name: Install Node.js (mcp-compose UI build)
        if: ${{ env.COMPOSE_REF != '' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Override mcp-compose (${{ needs.setup.outputs.compose-ref }}) [Windows]
        if: ${{ env.COMPOSE_REF != '' && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $condaBase = (conda info --base).Trim()
          $condaEnv = Join-Path $condaBase "envs\$($env:SERVER_ENV)"
          $src = Join-Path $env:RUNNER_TEMP "mcp-compose-override"
          if (Test-Path $src) { Remove-Item -Recurse -Force $src }
          $repoUrl = $env:COMPOSE_REPO.TrimEnd('/')
          if ($repoUrl -notmatch '\.git$') { $repoUrl = "$repoUrl.git" }
          git clone $repoUrl $src
          Push-Location $src
          git checkout $env:COMPOSE_REF
          if ($LASTEXITCODE -ne 0) {
            git fetch origin $env:COMPOSE_REF
            git checkout $env:COMPOSE_REF
          }
          if ($LASTEXITCODE -ne 0) { throw "git checkout $($env:COMPOSE_REF) failed" }
          Pop-Location
          Push-Location (Join-Path $src 'ui')
          npm install
          npm run build
          Pop-Location
          & "$condaEnv\python.exe" -m pip install hatchling
          & "$condaEnv\python.exe" -m pip install --no-build-isolation $src

      - name: Override mcp-compose (${{ needs.setup.outputs.compose-ref }}) [Unix]
        if: ${{ env.COMPOSE_REF != '' && runner.os != 'Windows' }}
        run: |
          conda run -n "$SERVER_ENV" --no-capture-output pip install \
            "git+${COMPOSE_REPO}.git@${COMPOSE_REF}"

      - name: Show installed versions in server env
        run: |
          conda run -n "$SERVER_ENV" --no-capture-output conda list \
            | grep -E "^(python|anaconda-mcp|environments-mcp-server|anaconda-connector|mcp-compose) "

      - name: Run MCP tool tests
        id: pytest
        env:
          MCP_SERVER_CONDA_ENV: ${{ env.SERVER_ENV }}
        run: |
          EXTRA_ARGS=""
          [[ "$MCP_PROFILE"     == "http-http" ]] && EXTRA_ARGS="$EXTRA_ARGS --start-server"
          [[ "$SKIP_HANG_STRESS" == "true"      ]] && EXTRA_ARGS="$EXTRA_ARGS --skip-hang-stress"

          conda run -n "$QA_ENV" --no-capture-output python -m pytest \
            tests/qa/mcp_tools \
            -o addopts= \
            --mcp-profile="$MCP_PROFILE" \
            --server-conda-env="$SERVER_ENV" \
            $EXTRA_ARGS \
            -v \
            --html="tests/qa/mcp_tools/reports/report.html" \
            --self-contained-html

      - name: Write profile summary (matrix rollup)
        if: always()
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome || 'not_run' }}
        run: |
          python3 <<'PY'
          import json
          import os

          out = os.environ.get("PYTEST_OUTCOME", "not_run")
          if out == "success":
            status = "passed"
          elif out == "failure":
            status = "failed"
          elif out in ("cancelled", "skipped"):
            status = out
          else:
            status = "not_run"

          data = {
            "runner": os.environ["RUNNER"],
            "python_version": os.environ["PYTHON_VERSION"],
            "mcp_profile": os.environ["MCP_PROFILE"],
            "skip_hang_stress": os.environ["SKIP_HANG_STRESS"],
            "pytest_step_outcome": out,
            "result": status,
          }
          path = os.environ["SUMMARY_FILE"]
          with open(path, "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)
          print(json.dumps(data))
          PY

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 'qa-report-${{ env.RUNNER }}-py${{ env.PYTHON_VERSION }}-${{ env.MCP_PROFILE }}'
          path: tests/qa/mcp_tools/reports/report.html
          if-no-files-found: ignore

      - name: Upload profile summary JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 'qa-mcp-profile-summary-${{ env.RUNNER }}-py${{ env.PYTHON_VERSION }}-${{ env.MCP_PROFILE }}'
          path: ${{ env.SUMMARY_FILE }}
          if-no-files-found: ignore
