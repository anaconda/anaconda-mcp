name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

jobs:
  unit:
    runs-on: [self-hosted-amd64-medium-privileged-on-demand]

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
          - python-version: "3.12"
          - python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: ${{ matrix.python-version }}
          use-mamba: true
          conda-solver: libmamba

      - name: Configure private conda channels
        run: |
          conda config --add channels conda-forge
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud/label/dev

      - name: Install conda dependencies
        run: |
          conda install -y mcp-compose anaconda-anon-usage

      - name: Install package and test dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/ --ignore=tests/qa -v --tb=short ${{ matrix.python-version == '3.13' && '--cov=anaconda_mcp --cov-report=xml --cov-report=term' || '' }}
