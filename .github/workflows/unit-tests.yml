name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

jobs:
  unit:
    name: Unit Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            python-version: "3.10"
          - os: linux
            runner: ubuntu-latest
            python-version: "3.11"
          - os: linux
            runner: ubuntu-latest
            python-version: "3.12"
          - os: linux
            runner: ubuntu-latest
            python-version: "3.13"
          - os: linux
            runner: ubuntu-latest
            python-version: "3.14"
          - os: macos
            runner: macos-latest
            python-version: "3.10"
          - os: macos
            runner: macos-latest
            python-version: "3.11"
          - os: macos
            runner: macos-latest
            python-version: "3.12"
          - os: macos
            runner: macos-latest
            python-version: "3.13"
          - os: macos
            runner: macos-latest
            python-version: "3.14"
          - os: windows
            runner: windows-latest
            python-version: "3.10"
          - os: windows
            runner: windows-latest
            python-version: "3.11"
          - os: windows
            runner: windows-latest
            python-version: "3.12"
          - os: windows
            runner: windows-latest
            python-version: "3.13"
          - os: windows
            runner: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: ${{ matrix.python-version }}
          use-mamba: true
          conda-solver: libmamba

      - name: Install package and test dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short ${{ matrix.python-version == '3.13' && matrix.os == 'linux' && '--cov=anaconda_mcp --cov-report=xml --cov-report=term' || '' }}
