name: Docker Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  ANACONDA_MCP_ACCEPTED_TERMS: "true"
  ANACONDA_MCP_ACCEPTED_TERMS_VERSION: "2026-05-27"

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}" ]; then
            echo "::error::The ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN secret is not set."
            echo "Go to Settings > Secrets and variables > Actions and add it."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          secrets: |
            ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN=${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}
          tags: anaconda-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - verify entrypoint
        run: docker run --rm anaconda-mcp:${{ github.sha }} --help

      - name: Smoke test - stdio tools/list round-trip
        env:
          ANACONDA_AUTH_API_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
          | docker run -i --rm \
              -e ANACONDA_MCP_ACCEPTED_TERMS -e ANACONDA_MCP_ACCEPTED_TERMS_VERSION -e ANACONDA_AUTH_API_KEY \
              anaconda-mcp:${{ github.sha }} serve > /tmp/mcp_out.txt 2>/tmp/mcp_err.txt || true
          echo "=== stdout ==="; cat /tmp/mcp_out.txt; echo "=== stderr ==="; cat /tmp/mcp_err.txt
          if grep -q "list_environments" /tmp/mcp_out.txt; then
            echo "✓ stdio tools/list returned conda tools"
          else
            echo "::error::stdio tools/list did not return conda tools (check TEST_API_KEY secret + server startup)"
            exit 1
          fi
