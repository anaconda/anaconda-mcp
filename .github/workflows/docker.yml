name: Docker Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Docker image
    runs-on: [self-hosted-amd64-medium-privileged-on-demand]    

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}" ]; then
            echo "::error::The ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN secret is not set."
            echo "Go to Settings > Secrets and variables > Actions and add it."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          secrets: |
            ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN=${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}
          tags: anaconda-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - verify entrypoint
        run: docker run --rm anaconda-mcp:${{ github.sha }} --help

      - name: Smoke test - verify HTTP server starts
        run: |
          docker run -d --name mcp-smoke -p 8000:8000 anaconda-mcp:${{ github.sha }}
          # Give the server time to start
          sleep 10
          # Dump logs for debugging regardless of outcome
          echo "=== Container logs ==="
          docker logs mcp-smoke
          echo "=== End logs ==="
          # Check the container is still running (not crashed)
          if ! docker inspect --format='{{.State.Running}}' mcp-smoke | grep -q true; then
            echo "::error::Container exited unexpectedly"
            exit 1
          fi
          # Clean up
          docker stop mcp-smoke
