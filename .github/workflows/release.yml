name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"   # pre-release: v1.0.0-rc.1
      - "v[0-9]+.[0-9]+.[0-9]+"              # full release: v1.0.0
    branches-ignore:
      - "**"
  workflow_dispatch: {}

jobs:
  conda-build:
    if: github.event_name == 'push'
    name: Build conda package (${{ matrix.config.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.config.runner }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        config:
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest
          - os: windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: ${{ matrix.python-version }}
          use-mamba: true
          conda-solver: libmamba
          auto-activate: true
          activate-environment: base

      - name: Install conda-build
        run: conda install -n base -y conda-build

      - name: Configure private conda channels
        run: |
          conda config --add channels conda-forge
          conda config --add channels datalayer
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud/label/dev
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_CONNECTOR_TOKEN }}/anaconda-connector

      - name: Write conda build config
        run: |
          printf 'python:\n  - "${{ matrix.python-version }}"\n' > conda-build/conda_build_config.yaml
          echo "=== conda_build_config.yaml contents ==="
          cat conda-build/conda_build_config.yaml

      - name: Build conda package
        run: |
          mkdir -p build/conda
          conda build \
            -c conda-forge \
            -c datalayer \
            -c https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud \
            -c https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud/label/dev \
            -c https://conda.anaconda.org/t/${{ secrets.ANACONDA_CONNECTOR_TOKEN }}/anaconda-connector \
            -m conda-build/conda_build_config.yaml \
            --output-folder build/conda \
            conda-build

      - name: Show built package
        run: find build/conda \( -name "*.conda" -o -name "*.tar.bz2" \) -exec ls -lh {} +

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package-${{ matrix.config.os }}-py${{ matrix.python-version }}
          path: build/conda/

  publish:
    name: Publish to Anaconda Cloud
    needs: conda-build
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Download all conda artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conda-package-*
          path: build/conda/
          merge-multiple: true

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          use-mamba: true
          conda-solver: libmamba
          auto-activate: true
          activate-environment: base

      - name: Install anaconda-client
        run: conda install -y anaconda-client

      - name: Determine channel label
        id: label
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-rc."* ]]; then
            echo "label=dev" >> "${GITHUB_OUTPUT}"
          else
            echo "label=main" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload to Anaconda Cloud
        env:
          ANACONDA_UPLOAD_TOKEN: ${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}
          ANACONDA_LABEL: ${{ steps.label.outputs.label }}
        run: |
          shopt -s globstar nullglob
          packages=(build/conda/**/*.conda)
          anaconda \
            --token "${ANACONDA_UPLOAD_TOKEN}" \
            upload \
            --user anaconda-cloud \
            --label "${ANACONDA_LABEL}" \
            --force \
            "${packages[@]}"

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all conda artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: conda-package-*
          path: build/conda/
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine if pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-rc."* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set MCPB version
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: node mcpb/scripts/set-version.mjs "${GITHUB_REF_NAME}"

      - name: Verify bundled runtime version
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: node mcpb/scripts/verify-runtime-version.mjs "${GITHUB_REF_NAME}"

      - name: Build MCPB bundle
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: make -C mcpb build

      - name: Generate registry server.json
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: |
          MCPB_SHA256="$(shasum -a 256 mcpb/anaconda-mcp.mcpb | awk '{print $1}')"
          node mcpb/scripts/write-server-json.mjs "${GITHUB_REF_NAME}" "${MCPB_SHA256}"

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-rc."* ]]; then
            VERSION="${TAG%%-rc.*}"
            RC_NUM="${TAG##*-rc.}"
            cat >> "${GITHUB_OUTPUT}" << EOF
          notes<<EON
          ## Release Candidate ${RC_NUM} for ${VERSION}

          > ⚠️ This is a pre-release. Not recommended for production use.

          Please test and report any issues before the final \`${VERSION}\` release.
          EON
          EOF
          else
            cat >> "${GITHUB_OUTPUT}" << EOF
          notes<<EON
          ## What's Changed

          See [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}) for full details.
          EON
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            build/conda/**/*.conda
          generate_release_notes: true

      - name: Upload MCPB release assets
        if: steps.prerelease.outputs.is_prerelease == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" mcpb/anaconda-mcp.mcpb server.json --clobber

      - name: Install mcp-publisher
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: steps.prerelease.outputs.is_prerelease == 'false'
        run: ./mcp-publisher publish

  build-dist:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.ref_name, '-rc.')
    name: Build PyPI distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: pipx run build

      - name: Refuse off-tag (dev/local) build
        run: |
          if ls dist/ | grep -Eq '\.dev|\+'; then
            echo "::error::Refusing to publish an off-tag build (dev/local version):"
            ls dist/
            exit 1
          fi

      - name: Verify distributions
        run: pipx run twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [build-dist]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/anaconda-mcp

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
