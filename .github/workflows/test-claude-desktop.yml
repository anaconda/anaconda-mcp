name: Claude Desktop Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/anaconda_mcp/claude_desktop.py'
      - 'src/anaconda_mcp/cli.py'
      - 'tests/test_claude_desktop.py'
      - '.github/workflows/test-claude-desktop.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/anaconda_mcp/claude_desktop.py'
      - 'src/anaconda_mcp/cli.py'
      - 'tests/test_claude_desktop.py'
      - '.github/workflows/test-claude-desktop.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: ${{ matrix.python-version }}
          use-mamba: true
          conda-solver: libmamba

      - name: Configure private conda channels
        run: |
          conda config --add channels conda-forge
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud/label/dev

      - name: Install conda dependencies
        run: |
          conda install -y mcp-compose anaconda-anon-usage

      - name: Install package in development mode
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run Claude Desktop tests
        run: |
          pytest tests/test_claude_desktop.py -v --tb=short

      - name: Run Claude Desktop tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          pytest tests/test_claude_desktop.py -v --cov=anaconda_mcp.claude_desktop --cov-report=xml --cov-report=term

      - name: Verify OS-specific path detection
        run: |
          chmod +x .github/scripts/verify_path_detection.sh
          .github/scripts/verify_path_detection.sh

      - name: Test CLI commands
        env:
          ANACONDA_AUTH_API_KEY: fake
        run: |
          chmod +x .github/scripts/test_cli.sh .github/scripts/verify_cli_config.sh
          .github/scripts/test_cli.sh

      - name: Test streamable-http transport
        run: |
          chmod +x .github/scripts/test_streamable_http.sh .github/scripts/verify_streamable_http.sh
          .github/scripts/test_streamable_http.sh

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: '3.11'
          use-mamba: true
          conda-solver: libmamba

      - name: Configure private conda channels
        run: |
          conda config --add channels conda-forge
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud
          conda config --add channels https://conda.anaconda.org/t/${{ secrets.ANACONDA_ORG_ANACONDA_CLOUD_CHANNEL_TOKEN }}/anaconda-cloud/label/dev

      - name: Install conda dependencies
        run: |
          conda install -y mcp-compose anaconda-anon-usage

      - name: Install package in development mode
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Test full workflow
        env:
          ANACONDA_AUTH_API_KEY: fake
        run: |
          chmod +x .github/scripts/test_integration.sh .github/scripts/verify_uninstall.sh
          .github/scripts/test_integration.sh
