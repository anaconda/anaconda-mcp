name: Claude Desktop Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/anaconda_mcp/claude_desktop.py'
      - 'src/anaconda_mcp/cli.py'
      - 'tests/test_claude_desktop.py'
      - '.github/workflows/test-claude-desktop.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/anaconda_mcp/claude_desktop.py'
      - 'src/anaconda_mcp/cli.py'
      - 'tests/test_claude_desktop.py'
      - '.github/workflows/test-claude-desktop.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov click

      - name: Install package in development mode
        run: |
          pip install -e ".[dev]"

      - name: Run Claude Desktop tests
        run: |
          pytest tests/test_claude_desktop.py -v --tb=short

      - name: Run Claude Desktop tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          pytest tests/test_claude_desktop.py -v --cov=anaconda_mcp.claude_desktop --cov-report=xml --cov-report=term

      - name: Verify OS-specific path detection
        shell: bash
        run: |
          echo "Testing Claude Desktop config path detection..."
          python -c "
          from anaconda_mcp.claude_desktop import get_claude_desktop_config_path
          import platform

          path = get_claude_desktop_config_path()
          system = platform.system()

          print(f'OS: {system}')
          print(f'Config path: {path}')

          # Verify path structure
          assert path.name == 'claude_desktop_config.json', f'Unexpected filename: {path.name}'
          assert 'Claude' in str(path), f'Claude not in path: {path}'

          if system == 'Linux':
              assert '.config' in str(path), f'Expected .config in Linux path: {path}'
          elif system == 'Darwin':
              assert 'Library' in str(path), f'Expected Library in macOS path: {path}'
              assert 'Application Support' in str(path), f'Expected Application Support in macOS path: {path}'
          elif system == 'Windows':
              # Windows paths may have AppData or Roaming
              path_str = str(path).lower()
              assert 'appdata' in path_str or 'roaming' in path_str, f'Expected AppData in Windows path: {path}'

          print('[PASS] Path detection test passed!')
          "

      - name: Test CLI commands
        shell: bash
        run: |
          echo "Testing CLI commands..."
          
          # Test help
          anaconda-mcp claude --help
          
          # Test path command
          anaconda-mcp claude path
          
          # Test install command (to temp file)
          TEMP_CONFIG=$(python -c "import tempfile, os; print(os.path.join(tempfile.gettempdir(), 'test_claude_config.json'))")
          anaconda-mcp claude install --config "$TEMP_CONFIG" --no-backup
          
            # Verify config was created
            TEMP_CONFIG="$TEMP_CONFIG" python -c "
            import json
            import os

            config_path = os.environ['TEMP_CONFIG']
            with open(config_path) as f:
              config = json.load(f)

          assert 'mcpServers' in config, 'mcpServers not in config'
          assert 'anaconda-mcp' in config['mcpServers'], 'anaconda-mcp not in config'

          server_config = config['mcpServers']['anaconda-mcp']
          assert 'command' in server_config, 'command not in server config'
          assert 'args' in server_config, 'args not in server config'
          assert 'env' in server_config, 'env not in server config'
          assert 'MCP_COMPOSE_CONFIG_DIR' in server_config['env'], 'MCP_COMPOSE_CONFIG_DIR not in env'

          print('[PASS] CLI install test passed!')
          "
          
          # Test show command
          anaconda-mcp claude show --config "$TEMP_CONFIG"
          
          # Test uninstall command
          anaconda-mcp claude uninstall --config "$TEMP_CONFIG" --no-backup
          
          echo "[PASS] All CLI tests passed!"

      - name: Test streamable-http transport
        shell: bash
        run: |
          TEMP_CONFIG=$(python -c "import tempfile, os; print(os.path.join(tempfile.gettempdir(), 'test_http_config.json'))")
          
          anaconda-mcp claude install \
            --config "$TEMP_CONFIG" \
            --transport streamable-http \
            --host 127.0.0.1 \
            --port 9999 \
            --no-backup
          
            TEMP_CONFIG="$TEMP_CONFIG" python -c "
            import json
            import os

            with open(os.environ['TEMP_CONFIG']) as f:
              config = json.load(f)

          server_config = config['mcpServers']['anaconda-mcp']
          assert server_config['transport'] == 'streamable-http', 'Wrong transport'
          assert '127.0.0.1' in server_config['url'], 'Wrong host in URL'
          assert '9999' in server_config['url'], 'Wrong port in URL'

          print('[PASS] Streamable HTTP transport test passed!')
          "

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test full workflow
        run: |
          # Create a temporary directory for testing
          TEMP_DIR=$(mktemp -d)
          CONFIG_PATH="$TEMP_DIR/claude_desktop_config.json"
          
          echo "=== Test 1: Fresh install ==="
          anaconda-mcp claude install --config "$CONFIG_PATH"
          cat "$CONFIG_PATH"
          
          echo ""
          echo "=== Test 2: Show configuration ==="
          anaconda-mcp claude show --config "$CONFIG_PATH"
          
          echo ""
          echo "=== Test 3: Verify backup was created ==="
          anaconda-mcp claude install --config "$CONFIG_PATH" --force
          ls -la "$TEMP_DIR"
          
          BACKUP_COUNT=$(ls "$TEMP_DIR"/*.backup.json 2>/dev/null | wc -l)
          if [ "$BACKUP_COUNT" -ge 1 ]; then
            echo "[PASS] Backup file created"
          else
            echo "[FAIL] No backup file found"
            exit 1
          fi
          
          echo ""
          echo "=== Test 4: Uninstall ==="
          anaconda-mcp claude uninstall --config "$CONFIG_PATH" --no-backup
          
            CONFIG_PATH="$CONFIG_PATH" python -c "
            import json
            import os
            with open(os.environ['CONFIG_PATH']) as f:
              config = json.load(f)
          assert 'anaconda-mcp' not in config.get('mcpServers', {}), 'Server not removed'
          print('[PASS] Uninstall successful')
          "
          
          echo ""
          echo "=== Test 5: JSON output ==="
          anaconda-mcp claude install --config "$CONFIG_PATH" --no-backup
          anaconda-mcp claude show --config "$CONFIG_PATH" --json | python -m json.tool
          
          # Cleanup
          rm -rf "$TEMP_DIR"
          
          echo ""
          echo "[PASS] All integration tests passed!"
