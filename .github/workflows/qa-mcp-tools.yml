name: QA — MCP tool tests

# QA-owned: tests the full anaconda-mcp stack across 3 MCP servers:
# - environments-mcp (6 tools): conda environment management
# - conda-meta-mcp (9 tools): conda metadata queries
# - search-mcp (5 tools): Anaconda.com search (requires ANACONDA_TOKEN)
#
# Tests run across runners, Python versions, transport profiles, and auth modes.
# Use checkboxes to select multiple runners and auth modes for parallel matrix execution.
#
# All defaults live in the `setup` job. The `test` job reads every value from
# needs.setup.outputs.*, so name/runs-on/steps all share the same resolved values.

on:
  workflow_dispatch:
    inputs:
      anaconda_mcp_ref:
        description: 'anaconda-mcp branch or tag (empty = triggered commit)'
        required: false
        default: 'v1.1.0-rc.0'
      environments_mcp_ref:
        description: 'environments-mcp branch or tag'
        required: false
        default: 'v1.0.0'
      anaconda_connector_ver:
        description: 'anaconda-connector conda package version (e.g. 0.1.11); empty = transitive dep'
        required: false
        default: '0.1.11'
      conda_meta_mcp_ver:
        description: 'conda-meta-mcp conda package version (empty = latest from conda-forge)'
        required: false
        default: '0.1.1'
      mcp_compose_repo:
        description: 'mcp-compose GitHub URL (fork or canonical)'
        required: false
        default: 'https://github.com/datalayer/mcp-compose'
      mcp_compose_ref:
        description: 'mcp-compose branch or tag (empty = use pip-installed version)'
        required: false
        default: 'v0.1.12'
      python_version:
        description: 'Python version (>=3.13 required for conda-meta-mcp tests)'
        required: false
        default: '3.13'
        type: choice
        options:
          - '3.14'
          - '3.13'
          - '3.12'
          - '3.11'
          - '3.10'
      test_scope:
        description: 'Which tests to run'
        required: false
        default: 'all-no-hangs'
        type: choice
        options:
          - 'all-no-hangs'
          - 'all-with-hangs'
          - 'hang-only'
          - 'environments-mcp'
          - 'search-mcp'
          - 'conda-meta-mcp'

      # ── Multi-select: Runners ─────────────────────────────────────────────────
      # Check multiple boxes to run tests on multiple runners in parallel
      runner_macos:
        description: 'Runner: macos-latest'
        type: boolean
        default: true
      runner_ubuntu:
        description: 'Runner: ubuntu-latest (2 CPU, 7GB)'
        type: boolean
        default: false
      runner_ubuntu_arm:
        description: 'Runner: ubuntu-24.04-arm'
        type: boolean
        default: false
      runner_windows:
        description: 'Runner: windows-latest'
        type: boolean
        default: false
      runner_self_hosted_large:
        description: 'Runner: self-hosted-amd64-large (8 CPU, 16GB - for heavy workloads)'
        type: boolean
        default: false

      # ── Multi-select: Transport profiles ──────────────────────────────────────────
      # Check multiple boxes to run tests across multiple transport profiles
      profile_stdio_http:
        description: 'Profile: stdio-http (STDIO client → HTTP upstream)'
        type: boolean
        default: true
      profile_http_http:
        description: 'Profile: http-http (HTTP client → HTTP upstream)'
        type: boolean
        default: false
      profile_stdio_stdio:
        description: 'Profile: stdio-stdio (STDIO client → STDIO upstream)'
        type: boolean
        default: false

  push:
    branches:
      - desk-1328-qa-owned-tests

jobs:
  # ── Resolve parameters & build matrix ─────────────────────────────────────────
  # Single source of truth for all defaults. Builds the runner×auth matrix.
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    outputs:
      matrix:             ${{ steps.matrix.outputs.matrix }}
      python-version:     ${{ steps.params.outputs.python-version }}
      test-scope:         ${{ steps.params.outputs.test-scope }}
      anaconda-mcp-ref:   ${{ steps.params.outputs.anaconda-mcp-ref }}
      env-mcp-ref:        ${{ steps.params.outputs.env-mcp-ref }}
      connector-ver:      ${{ steps.params.outputs.connector-ver }}
      compose-repo:       ${{ steps.params.outputs.compose-repo }}
      compose-ref:        ${{ steps.params.outputs.compose-ref }}
      conda-meta-ver:     ${{ steps.params.outputs.conda-meta-ver }}

    steps:
      - name: Resolve parameters
        id: params
        run: |
          PYTHON_VERSION="${{ inputs.python_version        || '3.13' }}"
          TEST_SCOPE="${{ inputs.test_scope                || 'all-no-hangs' }}"
          ANACONDA_MCP_REF="${{ inputs.anaconda_mcp_ref    || 'v1.1.0-rc.0' }}"
          ENV_MCP_REF="${{ inputs.environments_mcp_ref     || 'v1.0.0' }}"
          CONNECTOR_VER="${{ inputs.anaconda_connector_ver || '0.1.11' }}"
          COMPOSE_REPO="${{ inputs.mcp_compose_repo        || 'https://github.com/datalayer/mcp-compose' }}"
          COMPOSE_REF="${{ inputs.mcp_compose_ref          || 'v0.1.12' }}"
          CONDA_META_VER="${{ inputs.conda_meta_mcp_ver    || '0.1.1' }}"

          {
            echo "python-version=$PYTHON_VERSION"
            echo "test-scope=$TEST_SCOPE"
            echo "anaconda-mcp-ref=$ANACONDA_MCP_REF"
            echo "env-mcp-ref=$ENV_MCP_REF"
            echo "connector-ver=$CONNECTOR_VER"
            echo "compose-repo=$COMPOSE_REPO"
            echo "compose-ref=$COMPOSE_REF"
            echo "conda-meta-ver=$CONDA_META_VER"
          } >> "$GITHUB_OUTPUT"

          echo "=== Resolved parameters ==="
          printf "%-22s %s\n" "python:"           "$PYTHON_VERSION"
          printf "%-22s %s\n" "test-scope:"       "$TEST_SCOPE"
          printf "%-22s %s\n" "anaconda-mcp:"     "${ANACONDA_MCP_REF:-<triggered commit>}"
          printf "%-22s %s\n" "environments-mcp:" "$ENV_MCP_REF"
          printf "%-22s %s\n" "connector ver:"    "${CONNECTOR_VER:-<transitive dep>}"
          printf "%-22s %s\n" "mcp-compose repo:" "$COMPOSE_REPO"
          printf "%-22s %s\n" "mcp-compose ref:"  "${COMPOSE_REF:-<pip-installed version>}"
          printf "%-22s %s\n" "conda-meta-mcp:"   "${CONDA_META_VER:-<latest from conda-forge>}"

      - name: Build runner × profile matrix
        id: matrix
        run: |
          # Build runners array from checkboxes (default to macos-latest if none selected)
          RUNNERS=()
          [[ "${{ inputs.runner_macos }}" == "true" ]]              && RUNNERS+=("macos-latest")
          [[ "${{ inputs.runner_ubuntu }}" == "true" ]]             && RUNNERS+=("ubuntu-latest")
          [[ "${{ inputs.runner_ubuntu_arm }}" == "true" ]]         && RUNNERS+=("ubuntu-24.04-arm")
          [[ "${{ inputs.runner_windows }}" == "true" ]]            && RUNNERS+=("windows-latest")
          [[ "${{ inputs.runner_self_hosted_large }}" == "true" ]]  && RUNNERS+=("self-hosted-amd64-large-privileged-on-demand")

          # Default to macos-latest if no runner selected
          if [[ ${#RUNNERS[@]} -eq 0 ]]; then
            RUNNERS=("macos-latest")
          fi

          # Build profiles array from checkboxes (default to stdio-http if none selected)
          PROFILES=()
          [[ "${{ inputs.profile_stdio_http }}" == "true" ]]   && PROFILES+=("stdio-http")
          [[ "${{ inputs.profile_http_http }}" == "true" ]]    && PROFILES+=("http-http")
          [[ "${{ inputs.profile_stdio_stdio }}" == "true" ]]  && PROFILES+=("stdio-stdio")

          # Default to stdio-http if no profile selected
          if [[ ${#PROFILES[@]} -eq 0 ]]; then
            PROFILES=("stdio-http")
          fi

          # Build JSON matrix (runner × profile)
          MATRIX_JSON='{"include":['
          FIRST=true
          for runner in "${RUNNERS[@]}"; do
            for profile in "${PROFILES[@]}"; do
              if [[ "$FIRST" == "true" ]]; then
                FIRST=false
              else
                MATRIX_JSON+=','
              fi
              MATRIX_JSON+="{\"runner\":\"$runner\",\"profile\":\"$profile\"}"
            done
          done
          MATRIX_JSON+=']}'

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "=== Matrix ==="
          echo "$MATRIX_JSON" | jq .

          # Summary
          echo "### Test Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | Profile |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------|" >> "$GITHUB_STEP_SUMMARY"
          for runner in "${RUNNERS[@]}"; do
            for profile in "${PROFILES[@]}"; do
              echo "| $runner | $profile |" >> "$GITHUB_STEP_SUMMARY"
            done
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total configurations**: $((${#RUNNERS[@]} * ${#PROFILES[@]}))" >> "$GITHUB_STEP_SUMMARY"

  # ── Tests (matrix: runner × profile) ──────────────────────────────────────────
  test:
    needs: setup
    name: "[${{ matrix.runner }}] py${{ needs.setup.outputs.python-version }} / ${{ matrix.profile }}"
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    defaults:
      run:
        shell: bash -el {0}

    env:
      RUNNER:             ${{ matrix.runner }}
      PYTHON_VERSION:     ${{ needs.setup.outputs.python-version }}
      MCP_PROFILE:        ${{ matrix.profile }}
      TEST_SCOPE:         ${{ needs.setup.outputs.test-scope }}
      ANACONDA_MCP_REF:   ${{ needs.setup.outputs.anaconda-mcp-ref }}
      ENV_MCP_REF:        ${{ needs.setup.outputs.env-mcp-ref }}
      CONNECTOR_VER:      ${{ needs.setup.outputs.connector-ver }}
      COMPOSE_REPO:       ${{ needs.setup.outputs.compose-repo }}
      COMPOSE_REF:        ${{ needs.setup.outputs.compose-ref }}
      CONDA_META_VER:     ${{ needs.setup.outputs.conda-meta-ver }}
      SERVER_ENV:         anaconda-mcp-server
      QA_ENV:             anaconda-mcp-qa

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      # Always check out the triggered commit — this is the source of test code.
      - name: Checkout (test code)
        uses: actions/checkout@v4

      # When anaconda_mcp_ref differs from the triggered commit, check out the
      # requested version separately so the server installs that specific build
      # while tests still run from the current branch.
      - name: Checkout anaconda-mcp server version (${{ needs.setup.outputs.anaconda-mcp-ref }})
        if: ${{ env.ANACONDA_MCP_REF != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ANACONDA_MCP_REF }}
          path: ./anaconda-mcp-server-src

      # ── Conda setup ───────────────────────────────────────────────────────────
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@835234971496cad1653abb28a638a281cf32541f  # v3.2.0
        with:
          auto-activate-base: true
          python-version: ${{ env.PYTHON_VERSION }}
          # Force fresh miniconda install to avoid using pre-installed /usr/share/miniconda
          # on ubuntu-latest, which causes path resolution issues in environments-mcp
          miniconda-version: "latest"

      # ── QA runner env ─────────────────────────────────────────────────────────
      - name: Create / update QA env (pytest + dependencies)
        run: |
          conda env create -n "$QA_ENV" -f tests/qa/environment.yml --yes \
          || conda env update -n "$QA_ENV" -f tests/qa/environment.yml --prune

      # ── Server env ────────────────────────────────────────────────────────────
      - name: Create server conda env
        run: conda create -n "$SERVER_ENV" "python=$PYTHON_VERSION" --yes

      - name: Install anaconda-mcp into server env
        run: |
          # Use the separately checked-out version if provided, otherwise use the current tree
          SRC="."
          if [[ -d "./anaconda-mcp-server-src" ]]; then
            SRC="./anaconda-mcp-server-src"
          fi
          conda run -n "$SERVER_ENV" --no-capture-output pip install -e "$SRC"

      - name: Install anaconda-anon-usage
        run: conda install -n "$SERVER_ENV" -c defaults --yes anaconda-anon-usage

      - name: Checkout environments-mcp (${{ needs.setup.outputs.env-mcp-ref }})
        uses: actions/checkout@v4
        with:
          repository: anaconda/environments-mcp  # TODO: verify repo name
          token: ${{ secrets.GH_PACKAGE_TOKEN }}
          path: ./environments-mcp
          ref: ${{ env.ENV_MCP_REF }}

      - name: Install environments-mcp (${{ needs.setup.outputs.env-mcp-ref }}) into server env
        run: conda run -n "$SERVER_ENV" --no-capture-output pip install -e ./environments-mcp

      - name: Install anaconda-connector
        run: |
          if [[ -n "$CONNECTOR_VER" ]]; then
            # Private channel is only needed here, when pinning a specific conda version
            conda config --add channels "https://conda.anaconda.org/t/${{ secrets.ANACONDA_CONNECTOR_TOKEN }}/anaconda-connector"
            conda install -n "$SERVER_ENV" --yes \
              "anaconda-connector-conda=$CONNECTOR_VER" \
              "anaconda-connector-core=$CONNECTOR_VER" \
              "anaconda-connector-utilities=$CONNECTOR_VER"
          else
            # Use transitive dep pulled by environments-mcp; verify import
            conda run -n "$SERVER_ENV" --no-capture-output \
              python -c "import anaconda_connector_conda" 2>/dev/null \
            || conda install -n "$SERVER_ENV" --yes anaconda-connector-conda
          fi

      - name: Install conda-meta-mcp
        run: |
          if [[ -n "$CONDA_META_VER" ]]; then
            conda install -n "$SERVER_ENV" -c conda-forge --yes "conda-meta-mcp=$CONDA_META_VER"
          else
            conda install -n "$SERVER_ENV" -c conda-forge --yes conda-meta-mcp
          fi

      # mcp-compose pyproject.toml has a build hook that compiles a UI bundle;
      # npm must be available before pip attempts to build the wheel from source.
      - name: Set up Node.js (required to build mcp-compose from source)
        if: ${{ env.COMPOSE_REF != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Override mcp-compose (${{ needs.setup.outputs.compose-ref }})
        if: ${{ env.COMPOSE_REF != '' }}
        run: |
          conda run -n "$SERVER_ENV" --no-capture-output pip install \
            "git+${COMPOSE_REPO}.git@${COMPOSE_REF}"

      # ── Verification ──────────────────────────────────────────────────────────
      - name: Show installed versions in server env
        run: |
          conda run -n "$SERVER_ENV" --no-capture-output conda list \
            | grep -E "^(python|anaconda-mcp|environments-mcp-server|anaconda-connector|mcp-compose|conda-meta-mcp) "

      - name: Debug conda configuration
        run: |
          echo "=== System conda info ==="
          conda info
          echo ""
          echo "=== System conda config ==="
          conda config --show channels
          conda config --show envs_dirs
          echo ""
          echo "=== QA env conda info ==="
          conda run -n "$QA_ENV" --no-capture-output conda info
          echo ""
          echo "=== Server env conda info ==="
          conda run -n "$SERVER_ENV" --no-capture-output conda info
          echo ""
          echo "=== Server env conda config ==="
          conda run -n "$SERVER_ENV" --no-capture-output conda config --show channels
          conda run -n "$SERVER_ENV" --no-capture-output conda config --show envs_dirs
          echo ""
          echo "=== Environment variables ==="
          env | grep -iE "(conda|python)" | sort || true
          echo ""
          echo "=== .condarc files ==="
          cat ~/.condarc 2>/dev/null || echo "No ~/.condarc"
          echo "---"
          cat /etc/conda/.condarc 2>/dev/null || echo "No /etc/conda/.condarc"

      # ── Debug (Linux only) ────────────────────────────────────────────────────
      - name: Debug system resources (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== System Memory ==="
          free -h
          echo ""
          echo "=== CPU Info ==="
          nproc
          lscpu | grep -E "^(Architecture|CPU\(s\)|Model name)" || true
          echo ""
          echo "=== Disk Space ==="
          df -h /
          echo ""
          echo "=== Running Processes (by memory) ==="
          ps aux --sort=-%mem | head -15
          echo ""
          echo "=== Kernel OOM Settings ==="
          cat /proc/sys/vm/overcommit_memory 2>/dev/null || true
          cat /proc/sys/vm/overcommit_ratio 2>/dev/null || true
          echo ""
          echo "=== cgroup memory limits ==="
          cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo "No cgroup memory limit found"

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: Check for port conflicts before tests
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          echo "=== Checking ports 9888, 5041, 5042 ==="
          for port in 9888 5041 5042; do
            echo "Port $port:"
            lsof -i:$port 2>/dev/null || ss -tlnp | grep ":$port " || echo "  (not in use)"
          done

      - name: Run MCP tool tests
        id: test
        env:
          MCP_SERVER_CONDA_ENV: ${{ env.SERVER_ENV }}
          ANACONDA_AUTH_API_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          # Create results directory upfront so artifact upload always has something
          mkdir -p results
          RESULT_FILE="results/${{ matrix.runner }}-${{ matrix.profile }}.txt"

          # Initialize with error state (will be overwritten on success)
          echo "passed=0" > "$RESULT_FILE"
          echo "failed=0" >> "$RESULT_FILE"
          echo "skipped=0" >> "$RESULT_FILE"
          echo "errors=1" >> "$RESULT_FILE"
          echo "status=error" >> "$RESULT_FILE"

          # Use array to preserve argument boundaries (avoids word-splitting issues)
          EXTRA_ARGS=()
          TEST_PATH="tests/qa/mcp_tools"
          [[ "$MCP_PROFILE" == "http-http" ]] && EXTRA_ARGS+=("--start-server")

          # Determine test scope
          case "$TEST_SCOPE" in
            all-no-hangs)
              EXTRA_ARGS+=("--skip-hang-stress")
              ;;
            all-with-hangs)
              ;;
            hang-only)
              EXTRA_ARGS+=("-m" "hang_stress")
              ;;
            environments-mcp)
              EXTRA_ARGS+=("--skip-hang-stress" "-k" "not conda_meta and not search")
              ;;
            search-mcp)
              EXTRA_ARGS+=("--skip-hang-stress" "-k" "search")
              ;;
            conda-meta-mcp)
              EXTRA_ARGS+=("--skip-hang-stress" "-k" "conda_meta")
              ;;
          esac

          echo "=== Running tests ==="
          echo "Extra args: ${EXTRA_ARGS[*]}"

          # Start background memory monitor for http-http on Linux (to debug OOM kills)
          if [[ "$MCP_PROFILE" == "http-http" && "$RUNNER_OS" == "Linux" ]]; then
            echo "=== Starting memory monitor (http-http on Linux) ==="
            (
              while true; do
                echo "[$(date +%H:%M:%S)] Memory: $(free -h | grep Mem | awk '{print $3 "/" $2}')"
                ps aux --sort=-%mem | head -6 | tail -5
                sleep 10
              done
            ) &
            MEM_MONITOR_PID=$!
            echo "Memory monitor PID: $MEM_MONITOR_PID"
          fi

          # Disable exit-on-error so we can capture exit code and parse results
          set +e
          conda run -n "$QA_ENV" --no-capture-output python -m pytest \
            "$TEST_PATH" \
            -o addopts= \
            --mcp-profile="$MCP_PROFILE" \
            --server-conda-env="$SERVER_ENV" \
            --python-version="$PYTHON_VERSION" \
            "${EXTRA_ARGS[@]}" \
            -v \
            --html="tests/qa/mcp_tools/reports/report.html" \
            --self-contained-html \
            --junitxml="tests/qa/mcp_tools/reports/results.xml" \
            2>&1 | tee pytest-output.txt
          PYTEST_EXIT=${PIPESTATUS[0]}

          # Stop memory monitor if started
          if [[ -n "${MEM_MONITOR_PID:-}" ]]; then
            kill $MEM_MONITOR_PID 2>/dev/null || true
          fi

          # Check for fatal crashes (SIGKILL=137, SIGSEGV=139, etc.)
          if [[ $PYTEST_EXIT -eq 137 ]]; then
            echo "ERROR: Process was killed (exit 137 = SIGKILL)"
            echo "passed=0" > "$RESULT_FILE"
            echo "failed=0" >> "$RESULT_FILE"
            echo "skipped=0" >> "$RESULT_FILE"
            echo "errors=1" >> "$RESULT_FILE"
            echo "status=killed" >> "$RESULT_FILE"
            exit 1
          fi

          # Parse pytest summary line containing "passed" or "failed" or "error"
          # Excludes "test session starts" line which also matches === ... === pattern
          SUMMARY=$(grep -E "^[=]+.*(passed|failed|error|skipped).*[=]+$" pytest-output.txt | tail -1 || echo "")
          echo "Pytest summary: $SUMMARY"

          # Extract counts using regex (use || true to handle no-match)
          PASSED=$(echo "$SUMMARY" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' || true)
          FAILED=$(echo "$SUMMARY" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+' || true)
          SKIPPED=$(echo "$SUMMARY" | grep -oE '[0-9]+ skipped' | grep -oE '[0-9]+' || true)
          ERRORS=$(echo "$SUMMARY" | grep -oE '[0-9]+ error' | grep -oE '[0-9]+' || true)

          # Default to 0 if empty
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          ERRORS=${ERRORS:-0}

          # Update results file with actual values (overwrite initial error state)
          echo "passed=$PASSED" > "$RESULT_FILE"
          echo "failed=$FAILED" >> "$RESULT_FILE"
          echo "skipped=$SKIPPED" >> "$RESULT_FILE"
          echo "errors=$ERRORS" >> "$RESULT_FILE"

          # Determine actual test status from parsed results, not conda run exit code
          # (conda run on Linux may return 1 even when pytest passes)
          if [[ "${FAILED:-0}" -eq 0 && "${ERRORS:-0}" -eq 0 && -n "$SUMMARY" ]]; then
            echo "status=success" >> "$RESULT_FILE"
            FINAL_EXIT=0
          else
            echo "status=failed" >> "$RESULT_FILE"
            FINAL_EXIT=1
          fi

          echo "conda run exit: $PYTEST_EXIT, final exit: $FINAL_EXIT"

          # Re-enable exit-on-error only for the final exit
          set -e
          exit $FINAL_EXIT

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "qa-report-${{ matrix.runner }}-${{ matrix.profile }}-py${{ env.PYTHON_VERSION }}"
          path: tests/qa/mcp_tools/reports/report.html
          if-no-files-found: ignore

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "result-${{ matrix.runner }}-${{ matrix.profile }}"
          path: results/
          if-no-files-found: warn

  # ── Summary ───────────────────────────────────────────────────────────────────
  summary:
    needs: [setup, test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: all-results
          merge-multiple: true

      - name: Debug artifact structure
        run: |
          echo "=== all-results directory structure ==="
          find all-results -type f 2>/dev/null || echo "all-results not found"
          echo ""
          echo "=== Contents of txt files ==="
          for f in $(find all-results -name "*.txt" 2>/dev/null); do
            echo "--- $f ---"
            cat "$f"
          done

      - name: Generate summary
        run: |
          echo "## 📊 QA Test Results Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Configuration table
          echo "### Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python | ${{ needs.setup.outputs.python-version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Scope | ${{ needs.setup.outputs.test-scope }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| anaconda-mcp | ${{ needs.setup.outputs.anaconda-mcp-ref }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| environments-mcp | ${{ needs.setup.outputs.env-mcp-ref }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| conda-meta-mcp | ${{ needs.setup.outputs.conda-meta-ver }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mcp-compose | ${{ needs.setup.outputs.compose-ref }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Results table
          echo "### Results by Runner × Profile" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | Profile | Passed | Failed | Skipped | Errors | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------|--------|--------|---------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"

          CONFIGS_PASSED=0
          CONFIGS_FAILED=0
          TOTAL_CONFIGS=0
          TOTAL_TESTS_PASSED=0
          TOTAL_TESTS_FAILED=0
          TOTAL_TESTS_SKIPPED=0

          shopt -s nullglob
          # Try multiple path patterns in case directory structure varies
          # File names are: runner-profile.txt (e.g., macos-latest-stdio-http.txt)
          for file in all-results/*.txt all-results/*/*.txt all-results/*/*/*.txt; do
            if [[ -f "$file" ]]; then
              BASENAME=$(basename "$file" .txt)
              # Parse runner and profile from filename (format: runner-profile)
              # Profile is last component (stdio-http, http-http, stdio-stdio)
              if [[ "$BASENAME" =~ ^(.+)-(stdio-http|http-http|stdio-stdio)$ ]]; then
                RUNNER="${BASH_REMATCH[1]}"
                PROFILE="${BASH_REMATCH[2]}"
              else
                RUNNER="$BASENAME"
                PROFILE="unknown"
              fi

              # Read test counts from file
              source "$file"  # loads passed, failed, skipped, errors, status

              TOTAL_CONFIGS=$((TOTAL_CONFIGS + 1))
              TOTAL_TESTS_PASSED=$((TOTAL_TESTS_PASSED + ${passed:-0}))
              TOTAL_TESTS_FAILED=$((TOTAL_TESTS_FAILED + ${failed:-0}))
              TOTAL_TESTS_SKIPPED=$((TOTAL_TESTS_SKIPPED + ${skipped:-0}))

              if [[ "${failed:-0}" -eq 0 && "${errors:-0}" -eq 0 ]]; then
                ICON="✅"
                CONFIGS_PASSED=$((CONFIGS_PASSED + 1))
              else
                ICON="❌"
                CONFIGS_FAILED=$((CONFIGS_FAILED + 1))
              fi

              echo "| $RUNNER | $PROFILE | ${passed:-0} | ${failed:-0} | ${skipped:-0} | ${errors:-0} | $ICON |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [[ $TOTAL_CONFIGS -eq 0 ]]; then
            echo "| (no results found) | - | - | - | - | - | - |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Overall status
          echo "### Overall" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tests**: $TOTAL_TESTS_PASSED passed, $TOTAL_TESTS_FAILED failed, $TOTAL_TESTS_SKIPPED skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ $CONFIGS_FAILED -eq 0 && $TOTAL_CONFIGS -gt 0 ]]; then
            echo "✅ **All $CONFIGS_PASSED configurations passed**" >> "$GITHUB_STEP_SUMMARY"
          elif [[ $TOTAL_CONFIGS -gt 0 ]]; then
            echo "❌ **$CONFIGS_FAILED of $TOTAL_CONFIGS configurations failed**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ **No test results found**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "HTML reports are available in the workflow artifacts for each configuration." >> "$GITHUB_STEP_SUMMARY"
