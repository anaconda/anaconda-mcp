# On-demand MCP tool QA: manual dispatch with the same knobs as the reusable template.

name: QA — MCP tool tests (on demand)

on:
  workflow_dispatch:
    inputs:
      anaconda_mcp_ref:
        description: 'anaconda-mcp branch or tag (empty = triggered commit)'
        required: false
        default: 'v1.0.0'
      environments_mcp_ref:
        description: 'environments-mcp branch or tag'
        required: false
        default: 'v1.0.0'
      anaconda_connector_ver:
        description: 'anaconda-connector conda package version (e.g. 0.1.11); empty = transitive dep'
        required: false
        default: '0.1.11'
      mcp_compose_repo:
        description: 'mcp-compose GitHub URL (fork or canonical)'
        required: false
        default: 'https://github.com/j-iliukhina-anaconda/mcp-compose'
      mcp_compose_ref:
        description: 'mcp-compose branch or tag (empty = use anaconda-mcp pinned version)'
        required: false
        default: 'stdio-proxy-fixes'
      python_version:
        description: 'Python version'
        required: false
        default: '3.13'
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
      mcp_profile:
        description: 'Transport profile'
        required: false
        default: 'stdio-stdio'
        type: choice
        options:
          - 'http-http'
          - 'stdio-http'
          - 'stdio-stdio'
      skip_hang_stress:
        description: 'Skip hang_stress tests (slow, designed for dedicated stress runs)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      runner:
        description: 'Runner to use'
        required: false
        default: 'macos-latest'
        type: choice
        options:
          - macos-latest
          - macos-15-intel
          - windows-latest
          - ubuntu-latest

jobs:
  mcp-tool-tests:
    uses: ./.github/workflows/qa-mcp-test-execution.yml
    with:
      runner: ${{ inputs.runner }}
      python_version: ${{ inputs.python_version }}
      mcp_profile: ${{ inputs.mcp_profile }}
      skip_hang_stress: ${{ inputs.skip_hang_stress }}
      anaconda_mcp_ref: ${{ inputs.anaconda_mcp_ref }}
      environments_mcp_ref: ${{ inputs.environments_mcp_ref }}
      anaconda_connector_ver: ${{ inputs.anaconda_connector_ver }}
      mcp_compose_repo: ${{ inputs.mcp_compose_repo }}
      mcp_compose_ref: ${{ inputs.mcp_compose_ref }}
    secrets:
      GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGE_TOKEN }}
      ANACONDA_CONNECTOR_TOKEN: ${{ secrets.ANACONDA_CONNECTOR_TOKEN }}
