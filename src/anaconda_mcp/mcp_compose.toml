# MCP Compose Configuration
#
# ⚠️  WARNING: This file is a FALLBACK ONLY!
# ⚠️  If mcp_compose.toml.template exists, it will be used instead.
# ⚠️  To customize the configuration, edit mcp_compose.toml.template
#
# This file demonstrates all available configuration options

# ============================================================================
# Composer Settings
# ============================================================================
[composer]
name = "anaconda-mcp"
conflict_resolution = "prefix"  # prefix, suffix, ignore, error, override, custom
log_level = "INFO"
port = 2391

# ============================================================================
# Transport Configuration
# ============================================================================
[transport]
stdio_enabled = true
streamable_http_enabled = false
sse_enabled = false

# ============================================================================
# Authentication Configuration (Optional)
# ============================================================================
[authentication]
enabled = false
providers = ["anaconda"]
default_provider = "anaconda"

[authentication.anaconda]
domain = "anaconda.com"

# ============================================================================
# Embedded MCP Servers
# ============================================================================

# ============================================================================
# Proxied STDIO MCP Servers
# ============================================================================
[[servers.proxied.stdio]]
name = "conda"
command = ["python", "-m", "conda_mcp_lite"]
restart_policy = "on-failure"
max_restarts = 3

# ============================================================================
# Proxied Streamable HTTP MCP Servers (remote, no auto_start)
# ============================================================================
[[servers.proxied.streamable-http]]
name = "search"
url = "https://stage.anaconda.com/api/search/mcp"
timeout = 30
keep_alive = true
reconnect_on_failure = true
max_reconnect_attempts = 10
health_check_enabled = false
mode = "proxy"

# ============================================================================
# Tool Manager Configuration
# ============================================================================
[tool_manager]
conflict_resolution = "prefix"

[tool_manager.custom_template]
template = "{tool_name}"


[tool_manager.versioning]
enabled = false
allow_multiple_versions = false
version_suffix_format = "_v{version}"

# ============================================================================
# REST API Configuration
# ============================================================================
[api]
enabled = false
