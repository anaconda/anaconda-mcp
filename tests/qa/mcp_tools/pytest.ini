[pytest]
pythonpath = . ../shared
# HTML report: default path is set in conftest.py (tests/qa/mcp_tools/reports/report.html).
# Override with: pytest ... --html /path/to/report.html
log_level = INFO
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_date_format = %H:%M:%S
markers =
    smoke: Quick connectivity/sanity checks
    api: MCP tool API tests
    slow: Tests involving conda env create/remove (>10 s)
    regression: Bug regression tests
    http_transport: Tests that are HTTP-transport-specific and cannot run against STDIO
    stdio_transport: Tests that use STDIO transport (negative-control for KI-011)
    timeout: Per-test wall-clock limit in seconds (pytest-timeout plugin)
    hang_stress: KI-011 warm-iteration loops (many repeated tool calls); skip with --skip-hang-stress
    auth_independent: Tool works without authentication (environments-mcp, conda-meta-mcp)
    auth_required: Tool requires authentication to return results (skip when logged out)
    auth_enhanced: Tool works with/without auth, different results (public-only when logged out)
