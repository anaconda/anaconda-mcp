# Combined Test Workflow
# Runs CLI, Config, and API Tool tests together
# Copy to .github/workflows/ when ready to implement

name: All QA Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qa-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.11']
        include:
          # Python boundary checks (Linux only)
          - os: ubuntu-latest
            python: '3.10'
          - os: ubuntu-latest
            python: '3.13'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: ${{ matrix.python }}

      - name: Install anaconda-mcp
        run: conda install anaconda-mcp environments-mcp-server -y

      # === CLI Tests ===
      - name: CLI - Help
        run: anaconda-mcp --help

      - name: CLI - Config path
        run: anaconda-mcp claude-desktop path

      - name: CLI - Discover
        run: anaconda-mcp discover

      - name: CLI - Compose
        run: anaconda-mcp compose --output-format json

      # === Config Tests ===
      - name: Config - Setup
        run: anaconda-mcp claude-desktop setup-config

      - name: Config - Show
        run: anaconda-mcp claude-desktop show --json

      - name: Config - Remove
        run: anaconda-mcp claude-desktop remove-config

      # === Server + API Tests ===
      - name: Start server
        run: |
          anaconda-mcp serve --port 8888 &
          echo $! > /tmp/server.pid
          sleep 15

      - name: API - Initialize
        run: |
          curl -sf http://localhost:8888/mcp -X POST \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'

      - name: API - List tools
        run: |
          curl -sf http://localhost:8888/mcp -X POST \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | grep conda_list_environments

      - name: API - List environments
        run: |
          curl -sf http://localhost:8888/mcp -X POST \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"conda_list_environments","arguments":{}}}'

      - name: Cleanup
        if: always()
        run: |
          pkill -f "anaconda-mcp serve" || true
