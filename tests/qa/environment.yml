# Conda environment for all QA under tests/qa/ (mcp_tools, shared helpers, etc.)
#
#   conda env create -f tests/qa/environment.yml
#   conda activate anaconda-mcp-qa
#   pytest tests/qa/mcp_tools -o addopts= --mcp-profile=http-http ...
#
# If you already had this env before dependencies changed:
#   conda env update -f tests/qa/environment.yml --prune
#
name: anaconda-mcp-qa
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pytest>=7.0
  - pytest-asyncio>=0.23
  - pytest-html>=4.0
  - pytest-timeout>=2.3
  - httpx>=0.27
  - pip
  - pip:
    - anaconda-auth  # for keyring token resolution in search-mcp tests
