{% set name = "anaconda-mcp" %}
{% set version = (GIT_DESCRIBE_TAG or "0.0.0").lstrip("v").replace("-", ".") %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -v

requirements:
  host:
    - hatch-vcs >=0.4
    - hatchling >=1.25
    - python
    - pip
  run:
    - python >=3.13,<3.14
    - environments-mcp-server >=0.1.0,<2.0.0
    - mcp-compose >=0.1.12,<2.0.0
    - anaconda-auth >=0.13.0,<0.15.0
    - anaconda-cli-base >=0.8.1,<1.0.0
    - anaconda-anon-usage
    - anaconda-opentelemetry >=0.8.1,<1.2.0
    - conda-meta-mcp >=0.1.1,<0.2.0
    - click >=8.1.0,<9.0.0

about:
  summary: Anaconda MCP — AI assistant integration for your computing environment
  description: |
    The Anaconda MCP Server connects your conda environments to MCP-compatible AI assistants, enabling them to create, modify, and delete environments and packages on your machine. Install only if you trust the AI assistant you intend to connect and understand it can take real actions on your machine.
    By installing you acknowledge:
    * The AI assistant you connect to this MCP server is an independent third-party model, not a product or service of Anaconda.
    * Anaconda is NOT responsible for the actions the AI assistant directs within your environment, including unintended changes or deletions.

  home: https://github.com/anaconda/anaconda-mcp
  dev_url: https://github.com/anaconda/anaconda-mcp
  doc_url: https://github.com/anaconda/anaconda-mcp
  license: "Apache-2.0"

extra:
  recipe-maintainers:
    - Anaconda
