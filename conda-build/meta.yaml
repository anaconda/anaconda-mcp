{% set name = "anaconda-mcp" %}
{% set version = (GIT_DESCRIBE_TAG or "0.0.0").lstrip("v").replace("-", ".") %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -v

requirements:
  host:
    - python >=3.10,<3.14
    - pip
    - hatchling >=1.25
    - hatch-vcs >=0.4
  run:
    - python >=3.10,<3.14
    - environments-mcp-server >=0.1.0,<2.0.0
    - mcp-compose >=0.1.11,<2.0.0
    - anaconda-auth >=0.8.6,<0.10.0
    - anaconda-opentelemetry >=0.8.1,<1.2.0
    - click >=8.1.0,<9.0.0

about:
  summary: Anaconda MCP — AI assistant integration for your computing environment
  description: |
    The Anaconda MCP Server connects your conda environments to MCP-compatible AI assistants, 
    enabling them to create, modify, and delete environments and packages on your machine.
    The AI assistant you connect is an independent third-party model, not a product of Anaconda.
    Anaconda provides the tooling only — it does not control or take responsibility for actions the AI directs within your system.
    Install only if you trust the AI assistant you intend to connect and understand it can take real actions on your machine.

  home: https://github.com/anaconda/anaconda-mcp
  dev_url: https://github.com/anaconda/anaconda-mcp
  doc_url: https://github.com/anaconda/anaconda-mcp
  license: LicenseRef-Proprietary
  license_file: ../EULA.txt

extra:
  recipe-maintainers:
    - Anaconda
