{% set name = "anaconda-mcp" %}
  {% set version = (GIT_DESCRIBE_TAG or "0.0.0").lstrip("v").replace("-", ".") %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script:
    - python -m pip install . --no-deps -vv
    - mkdir -p "${PREFIX}/share/anaconda-mcp"
    - cp "${RECIPE_DIR}/../EULA.txt" "${PREFIX}/share/anaconda-mcp/"
    - if not exist "%PREFIX%\share\anaconda-mcp" mkdir "%PREFIX%\share\anaconda-mcp"
    - copy "%RECIPE_DIR%\..\EULA.txt" "%PREFIX%\share\anaconda-mcp\"
  post-link: scripts/post-link

requirements:
  host:
    - python >=3.10,<3.14
    - pip
    - hatchling >=1.25
    - hatch-vcs >=0.4
  run:
    - python >=3.10,<3.14
    - environments-mcp-server >=0.1.0,<2.0.0
    - mcp-compose >=0.1.11,<2.0.0
    - anaconda-auth >=0.8.6,<0.10.0
    - anaconda-opentelemetry >=0.8.1,<1.2.0
    - click >=8.1.0,<9.0.0

about:
  summary: Anaconda MCP
  home: https://github.com/anaconda/anaconda-mcp
  dev_url: https://github.com/anaconda/anaconda-mcp
  doc_url: https://github.com/anaconda/anaconda-mcp
  license: LicenseRef-Proprietary
  license_file: ../EULA.txt

extra:
  recipe-maintainers:
    - Anaconda